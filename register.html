<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Contest Bell</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <!-- ========== NAVBAR ========== -->
    <nav>
      <div class="nav-logo">
        <a href="index.html">
          <img src="assets/images/logo.png" alt="Contest Bell Logo" height="48" />
        </a>
      </div>
      <div class="nav-auth">
        <a href="login.html" class="btn-secondary">Log In</a>
      </div>
    </nav>

    <!-- ========== REGISTER SECTION ========== -->
    <section id="register">
      <div class="auth-card">

        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Start getting notified about contests in 2 minutes.</p>
        </div>

        <form id="register-form">

          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="john@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Minimum 6 characters"
              required
              minlength="6"
            />
          </div>

          <div class="form-group">
            <label for="timezone">
              Timezone
            </label>
            <select id="timezone" name="timeZone">
              <option value="" >Asia/Kolkata (IST) — Default</option>
              <optgroup label="Asia">
                <option value="Asia/Kolkata">Asia/Kolkata (IST, UTC+5:30)</option>
                <option value="Asia/Dubai">Asia/Dubai (UTC+4)</option>
                <option value="Asia/Singapore">Asia/Singapore (UTC+8)</option>
                <option value="Asia/Tokyo">Asia/Tokyo (UTC+9)</option>
                <option value="Asia/Shanghai">Asia/Shanghai (UTC+8)</option>
                <option value="Asia/Karachi">Asia/Karachi (UTC+5)</option>
                <option value="Asia/Dhaka">Asia/Dhaka (UTC+6)</option>
                <option value="Asia/Colombo">Asia/Colombo (UTC+5:30)</option>
                <option value="Asia/Kathmandu">Asia/Kathmandu (UTC+5:45)</option>
                <option value="Asia/Baghdad">Asia/Baghdad (UTC+3)</option>
                <option value="Asia/Tehran">Asia/Tehran (UTC+3:30)</option>
                <option value="Asia/Seoul">Asia/Seoul (UTC+9)</option>
                <option value="Asia/Jakarta">Asia/Jakarta (UTC+7)</option>
                <option value="Asia/Kuala_Lumpur">Asia/Kuala_Lumpur (UTC+8)</option>
                <option value="Asia/Tashkent">Asia/Tashkent (UTC+5)</option>
                <option value="Asia/Almaty">Asia/Almaty (UTC+6)</option>
              </optgroup>
              <optgroup label="Europe">
                <option value="Europe/London">Europe/London (GMT/BST)</option>
                <option value="Europe/Paris">Europe/Paris (CET, UTC+1)</option>
                <option value="Europe/Berlin">Europe/Berlin (CET, UTC+1)</option>
                <option value="Europe/Moscow">Europe/Moscow (UTC+3)</option>
                <option value="Europe/Istanbul">Europe/Istanbul (UTC+3)</option>
                <option value="Europe/Warsaw">Europe/Warsaw (CET, UTC+1)</option>
                <option value="Europe/Kyiv">Europe/Kyiv (EET, UTC+2)</option>
                <option value="Europe/Stockholm">Europe/Stockholm (CET, UTC+1)</option>
                <option value="Europe/Bucharest">Europe/Bucharest (EET, UTC+2)</option>
              </optgroup>
              <optgroup label="Americas">
                <option value="America/New_York">America/New_York (EST, UTC-5)</option>
                <option value="America/Chicago">America/Chicago (CST, UTC-6)</option>
                <option value="America/Denver">America/Denver (MST, UTC-7)</option>
                <option value="America/Los_Angeles">America/Los_Angeles (PST, UTC-8)</option>
                <option value="America/Toronto">America/Toronto (EST, UTC-5)</option>
                <option value="America/Vancouver">America/Vancouver (PST, UTC-8)</option>
                <option value="America/Sao_Paulo">America/Sao_Paulo (UTC-3)</option>
                <option value="America/Mexico_City">America/Mexico_City (CST, UTC-6)</option>
                <option value="America/Argentina/Buenos_Aires">America/Argentina/Buenos_Aires (UTC-3)</option>
                <option value="America/Bogota">America/Bogota (UTC-5)</option>
              </optgroup>
              <optgroup label="Africa">
                <option value="Africa/Cairo">Africa/Cairo (EET, UTC+2)</option>
                <option value="Africa/Lagos">Africa/Lagos (WAT, UTC+1)</option>
                <option value="Africa/Nairobi">Africa/Nairobi (EAT, UTC+3)</option>
                <option value="Africa/Johannesburg">Africa/Johannesburg (SAST, UTC+2)</option>
                <option value="Africa/Casablanca">Africa/Casablanca (UTC+1)</option>
              </optgroup>
              <optgroup label="Pacific & Oceania">
                <option value="Australia/Sydney">Australia/Sydney (AEDT, UTC+11)</option>
                <option value="Australia/Melbourne">Australia/Melbourne (AEDT, UTC+11)</option>
                <option value="Pacific/Auckland">Pacific/Auckland (NZDT, UTC+13)</option>
                <option value="Pacific/Honolulu">Pacific/Honolulu (HST, UTC-10)</option>
              </optgroup>
              <optgroup label="UTC">
                <option value="UTC">UTC (UTC+0)</option>
              </optgroup>
            </select>
          </div>

          <button type="submit" class="btn-primary btn-full">Create Account</button>

        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>

      </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer>
      <div class="footer-bottom">
        <p>© 2026 Contest Bell. All rights reserved.</p>
        <p>Made with ❤️ for the CP community.</p>
      </div>
    </footer>

  </body>
</html>
