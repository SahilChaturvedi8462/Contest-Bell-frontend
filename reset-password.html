<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Contest Bell</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>

  <body>

    <!-- ========== NAVBAR ========== -->
    <nav>
      <div class="nav-logo">
        <a href="index.html">
          <img src="assets/images/logo.png" alt="Contest Bell Logo" height="48" />
        </a>
      </div>
      <div class="nav-auth">
        <a href="login.html" class="btn-secondary">Log In</a>
        <a href="register.html" class="btn-primary">Register</a>
      </div>
    </nav>

    <!-- ========== RESET PASSWORD SECTION ========== -->
    <section id="reset-password">
      <div class="auth-card">

        <div class="auth-header">
          <h1>Reset Password</h1>
          <p>Enter your new password below.</p>
        </div>

        <!-- 
          This message shown if token is missing or invalid in URL.
          JS will handle showing/hiding this.
        -->
        <div id="invalid-token-message" hidden>
          <p>❌ This reset link is invalid or has expired.</p>
          <a href="forgot-password.html" class="btn-primary btn-full">Request a New Link</a>
        </div>

        <form id="reset-password-form">

          <div class="form-group">
            <label for="password">New Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Minimum 6 characters"
              required
              minlength="6"
            />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm New Password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirmPassword"
              placeholder="Repeat your new password"
              required
              minlength="6"
            />
          </div>

          <!-- 
            Shown by JS if passwords don't match before even hitting backend.
          -->
          <p id="password-mismatch-error" hidden>❌ Passwords do not match.</p>

          <button type="submit" class="btn-primary btn-full">Reset Password</button>

        </form>

        <!-- Shown by JS on success, form gets hidden -->
        <div id="success-message" hidden>
          <p>✅ Password reset successfully!</p>
          <a href="login.html" class="btn-primary btn-full">Go to Login</a>
        </div>

      </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer>
      <div class="footer-bottom">
        <p>© 2026 Contest Bell. All rights reserved.</p>
        <p>Made with ❤️ for the CP community.</p>
      </div>
    </footer>

  </body>
</html>
